    <meta charset="UTF-8">

    <meta name="description" content="Plan your visit to the museums of Mexico City's Historic Center">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Finlandica+Headline:ital,wght@0,100..900;1,100..900&family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Share+Tech&display=swap"
        rel="stylesheet">
</head>
<body>
    <header>
        <img src="images/Logo_Project.svg" alt="logo site" width="40" height="40">
        <span>MuseCen</span>
        <button id="ham-btn" class="hamburger" aria-label="Toggle Navigation menu"></button>
        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="museums.html">Museums</a></li>
                <li class="current"><a href="visit.html">Visit</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>JOIN FOR DISCOVER MORE</h1>
        <div class="join-container">
            <form action="form-action.html" method="get">

                <label for="firstName">First Name
                    <input type="text" id="firstName" name="firstName" title="First Name" autocomplete="given-name" required>
                </label>
                
                <label for="lastName">Last Name
                    <input type="text" id="lastName" name="lastName" title="Last Name" autocomplete="family-name" required>
                </label>

                <label for="email">Email
                    <input type="email" id="email" name="email" title="Email" autocomplete="email" placeholder="User45@gmail.com"
                        required>
                </label>

                <label for="interest">Museum Interest</label>
                <select id="interest" name="interest">
                    <option value="">Select a category</option>
                    <option value="History">History</option>
                    <option value="Art">Art</option>
                    <option value="Culture">Culture</option>
                    <option value="Science">Science</option>
                    <option value="All">All categories</option>
                </select>
                
                <label for="description">Comments
                    <textarea name="description" id="description" title="Bussiness Description"></textarea>
                </label>

                <button type="submit">Submit</button>
            </form>
            <div class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15050.204174092529!2d-99.13734344107087!3d19.431794713202233!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2smx!4v1781313970422!5m2!1ses!2smx"
                    width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </main>
    <footer>
        <div class="social">
            <a href="https://www.Instagram.com" target="_blank"><img src="images/instagram.svg" alt="Follow us on Instagram"
                    width="16" height="16"></a>
            <a href="https://www.youtube.com" target="_blank"><img src="images/youtube.svg" alt="Watch our Youtube channel"
                    width="16" height="16"></a>
            <a href="https://www.facebook.com" target="_blank"><img src="images/facebook.svg" alt="Follow us on Facebook"
                    width="16" height="16"></a>
        </div>
        <p>WDD 231 Class Project</p>
        <p>Jose Rodrigo Olivarez Marcelino</p>
        <p>&copy;<span id="currentYear"></span> MuseCen CDMX</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
